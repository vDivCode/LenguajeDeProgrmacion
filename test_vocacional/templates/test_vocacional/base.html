<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de recomendación vocacional multiparadigma. Descubre qué carrera universitaria es ideal para ti mediante inteligencia lógica y análisis funcional.">
    <title>{% block title %}Brújula Vocacional{% endblock %}</title>

    <!-- Google Fonts: mezcla carismática de fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;1,400&family=Patrick+Hand&display=swap" rel="stylesheet">

    <style>
        /* ================================================================
           VARIABLES Y SISTEMA DE DISEÑO
           ================================================================ */
        :root {
            --clr-bg:         #fef9f0;
            --clr-paper:      #fffcf5;
            --clr-line:       #e8dcc8;
            --clr-line-h:     #d4c4a0;
            --clr-ink:        #2d2013;
            --clr-ink-soft:   #5a4a32;
            --clr-ink-muted:  #8b7355;
            --clr-accent1:    #e8623a;   /* naranja cálido */
            --clr-accent2:    #4a90c4;   /* azul pizarrón */
            --clr-accent3:    #5eb854;   /* verde pizarrón */
            --clr-accent4:    #9b5cb8;   /* morado */
            --clr-highlight:  #ffd966;   /* amarillo marcador */
            --clr-shadow:     rgba(45, 32, 19, 0.12);
            --radius-sm:      6px;
            --radius-md:      12px;
            --radius-lg:      20px;
            --font-heading:   'Fredoka', sans-serif;
            --font-body:      'Nunito', sans-serif;
            --font-handwrite: 'Patrick Hand', cursive;
            --transition:     0.25s ease;
            --shadow-sm:      0 2px 8px var(--clr-shadow);
            --shadow-md:      0 4px 20px var(--clr-shadow);
            --shadow-lg:      0 8px 40px rgba(45, 32, 19, 0.18);
        }

        /* ================================================================
           RESET Y BASE
           ================================================================ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { font-size: 16px; scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            background-color: var(--clr-bg);
            color: var(--clr-ink);
            line-height: 1.6;
            min-height: 100vh;
            background-image:
                /* Cuadrícula tipo papel cuadriculado suave */
                linear-gradient(rgba(180, 160, 120, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(180, 160, 120, 0.08) 1px, transparent 1px);
            background-size: 28px 28px;
            position: relative;
        }

        /* Franja izquierda decorativa (margen de cuaderno) */
        body::before {
            content: '';
            position: fixed;
            left: 60px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(220, 100, 100, 0.25);
            z-index: 0;
            pointer-events: none;
        }

        /* ================================================================
           BARRA DE NAVEGACIÓN
           ================================================================ */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(254, 249, 240, 0.92);
            backdrop-filter: blur(8px);
            border-bottom: 2px solid var(--clr-line-h);
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 12px var(--clr-shadow);
        }

        .navbar-brand {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--clr-accent1);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
        }
        .navbar-brand:hover { transform: scale(1.04); }
        .navbar-brand .brand-icon { font-size: 1.6rem; }

        .navbar-links {
            display: flex;
            gap: 0.5rem;
            list-style: none;
        }
        .navbar-links a {
            font-family: var(--font-body);
            font-weight: 600;
            color: var(--clr-ink-soft);
            text-decoration: none;
            padding: 0.4rem 1rem;
            border-radius: var(--radius-md);
            transition: var(--transition);
        }
        .navbar-links a:hover {
            background: var(--clr-highlight);
            color: var(--clr-ink);
        }

        /* ================================================================
           CONTENEDOR PRINCIPAL
           ================================================================ */
        .main-container {
            max-width: 920px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
            position: relative;
            z-index: 1;
        }

        /* ================================================================
           TARJETAS (NOTEBOOK CARDS)
           ================================================================ */
        .card {
            background: var(--clr-paper);
            border: 2px solid var(--clr-line);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        /* Tachuela decorativa en la esquina */
        .card::before {
            content: '';
            position: absolute;
            top: -4px;
            left: 20px;
            font-size: 1.4rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        /* ================================================================
           TIPOGRAFÍA
           ================================================================ */
        h1 {
            font-family: var(--font-heading);
            font-weight: 700;
            color: var(--clr-ink);
            line-height: 1.2;
        }
        h2, h3 {
            font-family: var(--font-heading);
            font-weight: 600;
            color: var(--clr-ink);
        }

        .highlight-text {
            background: var(--clr-highlight);
            padding: 0.05em 0.3em;
            border-radius: 4px;
        }

        .text-accent { color: var(--clr-accent1); }
        .text-muted  { color: var(--clr-ink-muted); font-size: 0.9rem; }

        /* Subrayado tipo marcador */
        .underline-marker {
            text-decoration: underline;
            text-decoration-color: var(--clr-highlight);
            text-decoration-thickness: 4px;
            text-underline-offset: 3px;
        }

        /* ================================================================
           BOTONES
           ================================================================ */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: var(--font-heading);
            font-size: 1rem;
            font-weight: 600;
            padding: 0.7rem 1.8rem;
            border-radius: var(--radius-md);
            border: 2px solid transparent;
            cursor: pointer;
            text-decoration: none;
            transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
            position: relative;
            overflow: hidden;
        }
        .btn:active { transform: scale(0.97); }

        .btn-primary {
            background: var(--clr-accent1);
            color: white;
            border-color: var(--clr-accent1);
            box-shadow: 0 4px 0 #b84a25, var(--shadow-sm);
        }
        .btn-primary:hover {
            background: #d4502d;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #b84a25, var(--shadow-md);
        }

        .btn-secondary {
            background: var(--clr-paper);
            color: var(--clr-ink-soft);
            border-color: var(--clr-line-h);
            box-shadow: 0 3px 0 var(--clr-line-h), var(--shadow-sm);
        }
        .btn-secondary:hover {
            background: var(--clr-highlight);
            border-color: #e0c050;
            transform: translateY(-2px);
            color: var(--clr-ink);
        }

        .btn-lg {
            font-size: 1.15rem;
            padding: 0.9rem 2.4rem;
        }

        /* ================================================================
           DIVISOR DECORATIVO
           ================================================================ */
        .divider {
            border: none;
            border-top: 2px dashed var(--clr-line-h);
            margin: 1.5rem 0;
        }

        /* ================================================================
           BADGES / ETIQUETAS
           ================================================================ */
        .badge {
            display: inline-block;
            font-family: var(--font-handwrite);
            font-size: 0.78rem;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            border: 1.5px solid currentColor;
            font-weight: 600;
        }
        .badge-orange { color: var(--clr-accent1); background: rgba(232,98,58,0.1); }
        .badge-blue   { color: var(--clr-accent2); background: rgba(74,144,196,0.1); }
        .badge-green  { color: var(--clr-accent3); background: rgba(94,184,84,0.1); }
        .badge-purple { color: var(--clr-accent4); background: rgba(155,92,184,0.1); }

        /* ================================================================
           BARRA DE PROGRESO PERSONALIZADA
           ================================================================ */
        .progress-bar-wrap {
            background: var(--clr-line);
            border-radius: 20px;
            height: 14px;
            overflow: hidden;
            border: 1.5px solid var(--clr-line-h);
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, var(--clr-accent1), var(--clr-highlight));
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }
        .progress-bar-fill::after {
            content: '';
            position: absolute;
            top: 2px; left: 6px; right: 6px; bottom: 2px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
        }

        /* ================================================================
           MENSAJES DE ERROR / ADVERTENCIA
           ================================================================ */
        .alert {
            padding: 0.9rem 1.2rem;
            border-radius: var(--radius-md);
            border-left: 4px solid;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        .alert-error {
            background: rgba(220, 38, 38, 0.08);
            border-color: #dc2626;
            color: #b91c1c;
        }
        .alert-warning {
            background: rgba(234, 179, 8, 0.1);
            border-color: #ca8a04;
            color: #92400e;
        }

        /* ================================================================
           PIE DE PÁGINA
           ================================================================ */
        .footer {
            text-align: center;
            padding: 2rem;
            color: var(--clr-ink-muted);
            font-family: var(--font-handwrite);
            font-size: 0.9rem;
            border-top: 2px dashed var(--clr-line);
            margin-top: 3rem;
        }

        /* ================================================================
           RESPONSIVE
           ================================================================ */
        @media (max-width: 640px) {
            body::before { display: none; }
            .navbar { padding: 0.6rem 1rem; }
            .main-container { padding: 1.5rem 1rem 3rem; }
            .card { padding: 1.5rem; }
            .btn-lg { font-size: 1rem; padding: 0.8rem 1.8rem; }
        }

        /* ================================================================
           ANIMACIONES GLOBALES
           ================================================================ */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes wiggle {
            0%,100% { transform: rotate(0deg); }
            25%      { transform: rotate(-5deg); }
            75%      { transform: rotate(5deg); }
        }
        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-8px); }
        }

        .animate-in { animation: fadeInUp 0.5s ease forwards; }
    </style>

    {% block extra_styles %}{% endblock %}
</head>
<body>

    <!-- ==================== NAVBAR ==================== -->
    <nav class="navbar" role="navigation" aria-label="Navegación principal">
        <a href="/" class="navbar-brand" id="nav-home-link">
            <span class="brand-icon"></span> Brújula Vocacional
        </a>
        <ul class="navbar-links">
            <li><a href="/" id="nav-inicio">Inicio</a></li>
            <li><a href="/test/" id="nav-test">Tomar el Test</a></li>
        </ul>
    </nav>

    <!-- ==================== CONTENIDO ==================== -->
    <main class="main-container" role="main">
        {% block content %}{% endblock %}
    </main>

    <!-- ==================== PIE DE PÁGINA ==================== -->
    <footer class="footer" role="contentinfo">
        <p>Brújula Vocacional &mdash; Sistema Multiparadigma (Lógico · Funcional · OO)</p>
        <p style="margin-top:0.3rem; font-size:0.8rem;">Desarrollado con Python · Django · pyDatalog</p>
    </footer>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
